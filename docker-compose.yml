version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: notesproyects-app
    container_name: notesproyects-app
    restart: unless-stopped
    ports:
      - "8003:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-notesproyects}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - RUN_MIGRATIONS=true
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8081
      - REVERB_SCHEME=http
      - REVERB_APP_ID=${REVERB_APP_ID:-958876}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-npnjdx8l2r9bajdffqdm}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-ksort2s7cgphjtj03dpg}
    depends_on:
      - db
    networks:
      - notes-network

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notesproyects-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8080"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - REVERB_APP_ID=${REVERB_APP_ID:-958876}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-npnjdx8l2r9bajdffqdm}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-ksort2s7cgphjtj03dpg}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-notesproyects}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      - db
    networks:
      - notes-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notesproyects-queue
    restart: unless-stopped
    command: php artisan queue:work
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - REVERB_APP_ID=${REVERB_APP_ID:-958876}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-npnjdx8l2r9bajdffqdm}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-ksort2s7cgphjtj03dpg}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-notesproyects}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      - db
    networks:
      - notes-network

  db:
    image: mysql:8.0
    container_name: notesproyects-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-notesproyects}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge

volumes:
  dbdata:

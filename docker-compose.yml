services:
  # ---------------------------------------------------------------------------
  # Laravel Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8003:80"
      - "8081:8080"
    environment:
      # Solo las variables de red necesarias para conectar contenedores
      # Todo lo demas se lee desde el .env
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - storage_uploads:/var/www/storage/app/public
      - storage_logs:/var/www/storage/logs
      - app_secrets:/var/secrets
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # MySQL 8 Database
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-notesproyects}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-np_db_secret_2026}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-np_root_secret_2026}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-np_root_secret_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis (cache, sessions)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  db_data:
  redis_data:
  storage_uploads:
  storage_logs:
  app_secrets:      # persiste APP_KEY y claves Reverb entre reinicios

networks:
  app_network:
    driver: bridge

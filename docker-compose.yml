version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: notesproyects-app
    container_name: notesproyects-app
    restart: unless-stopped
    ports:
      - "8003:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-notesproyects}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - RUN_MIGRATIONS=true
    depends_on:
      - db
    networks:
      - notes-network

  db:
    image: mysql:8.0
    container_name: notesproyects-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-notesproyects}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge

volumes:
  dbdata:
